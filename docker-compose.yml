services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: literature
      POSTGRES_USER: literature
      POSTGRES_PASSWORD: literature
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: linguaphilia
      MINIO_ROOT_PASSWORD: linguaphilia-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

